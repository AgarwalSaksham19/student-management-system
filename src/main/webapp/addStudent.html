<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .card input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        .card input:focus {
            border-color: #4CAF50;
        }

        .card button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .card button:hover {
            opacity: 0.9;
        }

        .back {
            margin-top: 15px;
            display: block;
            text-decoration: none;
            color: #2196F3;
            font-size: 14px;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Add Student</h2>
    <a class="home-btn" href="home">Home</a>

    <form action="addStudent" method="post">

        <input type="text" name="name" placeholder="Enter Name" required>

        <input type="number" name="age" placeholder="Enter Age" required>

        <input type="text" name="email" placeholder="Enter Email" required>

        <input type="text" name="course" placeholder="Enter Course" required>

        <button type="submit">Add Student</button>

    </form>

    <a class="back" href="home">← Back to Dashboard</a>
</div>

</body>
</html>
